<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changa Asta - Royal Gold & Slate Edition</title>
  <meta name="description" content="Play the premium Royal Gold & Slate edition of the ancient Indian board game Changa Asta (Ashta Chamma / Chowka Bara) against friends or smart AI bots.">
  
  <!-- Open Graph / Social Sharing Meta Tags -->
  <meta property="og:title" content="Changa Asta - The Royal Strategy Game">
  <meta property="og:description" content="Play the premium Royal Gold & Slate edition of the ancient Indian board game Changa Asta (Ashta Chamma / Chowka Bara) against friends or smart AI bots.">
  <meta property="og:image" content="https://changaasta.pages.dev/preview.png">
  <meta property="og:url" content="https://changaasta.pages.dev">
  <meta property="og:type" content="website">
 
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Changa Asta - The Royal Strategy Game">
  <meta name="twitter:description" content="Play the premium Royal Gold & Slate edition of the ancient Indian board game Changa Asta (Ashta Chamma / Chowka Bara) against friends or smart AI bots.">
  <meta name="twitter:image" content="https://changaasta.pages.dev/preview.png">
  <meta name="theme-color" content="#0b110e">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>CHANGA ASTA</h1>
      <p>The Ancient Game of Strategy & Probability</p>
    </header>

    <!-- SETUP / LOBBY SCREEN -->
    <div id="setup-screen" class="glass-panel">
      <h2 class="setup-title">Khel Ki Settings</h2>

      <div class="lobby-layout">
        
        <!-- Board Size Settings -->
        <div class="settings-group settings-board slide-up delay-1">
          <span class="settings-label">Board Chunein:</span>
          <div class="toggle-options" id="toggle-size-container">
            <button class="btn-toggle active" data-val="5">5x5 Grid (4 Kaudi)</button>
            <button class="btn-toggle" data-val="7">7x7 Grid (6 Kaudi)</button>
          </div>
          <input type="hidden" id="select-size" data-value="5">
        </div>

        <!-- Player Count Settings -->
        <div class="settings-group settings-count slide-up delay-2">
          <span class="settings-label">Khiladi Ki Sankhya:</span>
          <div class="toggle-options" id="toggle-count-container">
            <button class="btn-toggle" data-val="2" onclick="window.selectPlayerCount(2)">2 Players</button>
            <button class="btn-toggle" data-val="3" onclick="window.selectPlayerCount(3)">3 Players</button>
            <button class="btn-toggle active" data-val="4" onclick="window.selectPlayerCount(4)">4 Players</button>
          </div>
          <input type="hidden" id="select-count" data-value="4">
        </div>

        <!-- Game Mode Settings -->
        <div class="settings-group settings-mode slide-up delay-3">
          <span class="settings-label">Khelne Ka Tareeka:</span>
          <div class="toggle-options" id="toggle-mode-container">
            <button class="btn-toggle active" data-val="local" onclick="window.selectGameMode('local')">Pass & Play</button>
            <button class="btn-toggle" data-val="bot" onclick="window.selectGameMode('bot')">Vs Computer</button>
          </div>
          <input type="hidden" id="select-mode" data-value="local">
        </div>

        <!-- PLAYER ROSTER -->
        <div class="settings-group roster-group settings-roster slide-up delay-5">
          <span class="settings-label">Khiladi Chunein:</span>
          <div class="player-setup-grid">
            
            <!-- South (Red) -->
            <div class="player-setup-card card-red">
              <div class="card-header">
                <span class="color-indicator red"></span>
                <input type="text" id="name-red" value="Neeche Wala (Red)" placeholder="Red Name">
              </div>
              <div class="segmented-control bot-toggle-wrapper" id="seg-red" style="display: none;">
                <button class="seg-btn active" data-val="human" onclick="window.selectPlayerType('red', 'human')">Insaan</button>
                <button class="seg-btn" data-val="bot" onclick="window.selectPlayerType('red', 'bot')">Computer</button>
              </div>
              <input type="hidden" id="type-red" value="human">
            </div>

            <!-- West (Green) -->
            <div class="player-setup-card card-green">
              <div class="card-header">
                <span class="color-indicator green"></span>
                <input type="text" id="name-green" value="Baayein Wala (Green)" placeholder="Green Name">
              </div>
              <div class="segmented-control bot-toggle-wrapper" id="seg-green" style="display: none;">
                <button class="seg-btn active" data-val="human" onclick="window.selectPlayerType('green', 'human')">Insaan</button>
                <button class="seg-btn" data-val="bot" onclick="window.selectPlayerType('green', 'bot')">Computer</button>
              </div>
              <input type="hidden" id="type-green" value="human">
            </div>

            <!-- North (Yellow) -->
            <div class="player-setup-card card-yellow">
              <div class="card-header">
                <span class="color-indicator yellow"></span>
                <input type="text" id="name-yellow" value="Upar Wala (Yellow)" placeholder="Yellow Name">
              </div>
              <div class="segmented-control bot-toggle-wrapper" id="seg-yellow" style="display: none;">
                <button class="seg-btn active" data-val="human" onclick="window.selectPlayerType('yellow', 'human')">Insaan</button>
                <button class="seg-btn" data-val="bot" onclick="window.selectPlayerType('yellow', 'bot')">Computer</button>
              </div>
              <input type="hidden" id="type-yellow" value="human">
            </div>

            <!-- East (Blue) -->
            <div class="player-setup-card card-blue">
              <div class="card-header">
                <span class="color-indicator blue"></span>
                <input type="text" id="name-blue" value="Daayein Wala (Blue)" placeholder="Blue Name">
              </div>
              <div class="segmented-control bot-toggle-wrapper" id="seg-blue" style="display: none;">
                <button class="seg-btn active" data-val="human" onclick="window.selectPlayerType('blue', 'human')">Insaan</button>
                <button class="seg-btn" data-val="bot" onclick="window.selectPlayerType('blue', 'bot')">Computer</button>
              </div>
              <input type="hidden" id="type-blue" value="human">
            </div>

          </div>
        </div>

        <!-- Advanced Rules Toggles -->
        <div class="settings-group settings-rules slide-up delay-4">
          <span class="settings-label">Niyam Chunein:</span>
          <div class="toggle-options">
            <button class="btn-toggle active" id="rule-gatti">Gatti Banana (Blockades)</button>
            <button class="btn-toggle" id="rule-spawn">Ghar Se Nikalna (4/8/6/12 Par)</button>
          </div>
        </div>

      </div>

      <div class="slide-up delay-6" style="display: flex; justify-content: center; width: 100%;">
        <button class="btn-primary" onclick="window.startGame()" style="width: 100%; max-width: 320px; padding: 15px 30px;">KHEL SHURU KAREIN</button>
      </div>
    </div>

    <!-- MAIN GAMEPLAY SCREEN -->
    <div id="game-screen" class="hidden">
      
      <!-- Left Sidebar for Logs -->
      <div class="sidebar-left">
        <!-- Logging Console -->
        <div class="log-panel glass-panel">
          <div class="log-title">Khel Ka Vivaran</div>
          <div class="log-content" id="log-box"></div>
        </div>
      </div>
      
      <!-- Board Area with Chalk Pockets -->
      <div class="board-outer-container">
        <div class="board-wrapper">
          <!-- Yards as chalk ovals -->
          <div class="yard-pocket top" id="yard-yellow" title="North Yard"></div>
          <div class="yard-pocket left" id="yard-green" title="West Yard"></div>
          <div class="yard-pocket right" id="yard-blue" title="East Yard"></div>
          <div class="yard-pocket bottom" id="yard-red" title="South Yard"></div>
          
          <div class="board-frame">
            <div id="board" class="board-grid"></div>
          </div>
        </div>
      </div>

      <!-- Controls & Stats Sidebar -->
      <div class="sidebar">
        
        <!-- Current Turn Display -->
        <div class="player-turn-indicator glass-panel">
          <div class="status-avatar" id="turn-avatar">●</div>
          <div class="turn-name-container">
            <span class="player-tag" id="turn-name">---</span>
            <span class="phase-tag" id="turn-phase">---</span>
          </div>
        </div>

        <!-- Rolling Panel -->
        <div class="roll-panel glass-panel">
          <!-- 3D Cowrie Shell Elements -->
          <div class="shells-container">
            <div class="cowrie-shell" id="shell-0"><div class="slit"></div><div class="back-ridges"></div></div>
            <div class="cowrie-shell" id="shell-1"><div class="slit"></div><div class="back-ridges"></div></div>
            <div class="cowrie-shell" id="shell-2"><div class="slit"></div><div class="back-ridges"></div></div>
            <div class="cowrie-shell" id="shell-3"><div class="slit"></div><div class="back-ridges"></div></div>
            <div class="cowrie-shell" id="shell-4"><div class="slit"></div><div class="back-ridges"></div></div>
            <div class="cowrie-shell" id="shell-5"><div class="slit"></div><div class="back-ridges"></div></div>
          </div>

          <!-- Throw Power Meter -->
          <div id="power-meter-container" class="power-meter-container hidden">
            <div class="power-meter-label">TOSS POWER: <span id="power-text">0%</span></div>
            <div class="power-meter-track">
              <div id="power-bar" class="power-bar"></div>
            </div>
          </div>

          <button id="btn-roll" class="btn-primary" style="width: 100%;">KOUDI FEKEIN</button>
          
          <!-- Remaining Move values to apply -->
          <div id="roll-queue" class="queue-panel"></div>
        </div>

        <!-- Utilities -->
        <div class="utility-controls glass-panel">
          <button class="btn-icon" id="btn-mute" onclick="toggleMute()" title="Mute Audio">
            <span id="volume-icon">🔊</span>
          </button>
          <button class="btn-primary" style="font-size: 0.85rem; padding: 8px 15px;" onclick="restartGame()">Naya Khel</button>
        </div>

      </div>
    </div>

    <!-- VICTORY OVERLAY SCREEN -->
    <div id="victory-overlay" class="hidden">
      <div class="victory-card glass-panel">
        <h2 class="victory-title">JEET!</h2>
        <div id="victory-banner" class="winner-banner">Khiladi Jeet Gaya!</div>
        <p style="color: var(--text-muted);">Sabhi 4 gotiyan center (Ghar) pahunch gayi!</p>
        <button class="btn-primary" onclick="restartGame()" style="margin-top: 15px;">FIR SE KHELEIN</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
  <script src="favicon.js"></script>
</body>
</html>
